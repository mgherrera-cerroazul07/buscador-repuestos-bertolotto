<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Bertolotto</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; }
        .buscador-wrapper {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 30px;
            max-width: 1000px;
            margin: auto;
        }
        .buscador-img { flex: 1; min-width: 300px; }
        .buscador-img img { width: 100%; border-radius: 8px; }
        .buscador-form { flex: 1; min-width: 300px; }
        
        /* Ajuste para móviles */
        @media (max-width: 768px) {
            .buscador-wrapper { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="buscador-wrapper">
    <div class="buscador-img">
        <img src="neumaticosparagithub.jpg" alt="Buscá por vehículo">
    </div>
    
    <div class="buscador-form">
        <!-- AQUÍ VA TU CÓDIGO ORIGINAL (Tus selectores de Marca, Modelo, etc.) -->
    </div>
</div>

</html>
